{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Cook</title>
    <script src="{% static 'pages/script.js' %}" defer></script>
    <link rel="stylesheet" href="{% static 'pages/style.css' %}">
</head>
<body>

    <nav>
        <ul>
            <li><a href="{% url 'home' %}">Home</a></li>
            <li><a href="{% url 'grocery' %}">Grocery</a></li>
            <li><a href="{% url 'about' %}">About</a></li>
            <li><a href="{% url 'recipe_list' %}">Recipes</a></li>
            {% if user.is_authenticated %}
                <li><a href="{% url 'profile' %}">Profile</a></li>
                <li>
                    <!-- logout must be POST — using a small form instead of a link -->
                    <form method="POST" action="{% url 'logout' %}" style="display:inline;">
                        {% csrf_token %}
                        <button type="submit" class="nav_logout_btn">Logout</button>
                    </form>
                </li>
            {% else %}
                <li><a href="{% url 'login' %}">Login</a></li>
                <li><a href="{% url 'signup' %}">Sign Up</a></li>
            {% endif %}
        </ul>
    </nav>

    {% block content %}
    <!-- child pages replace this block with their own content -->
    {% endblock %}

</body>
</html>
