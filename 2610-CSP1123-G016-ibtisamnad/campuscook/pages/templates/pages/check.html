{% extends "pages/base.html" %}

{% block content %}

{%if recipe.id %}
    <h2>{{ recipe.name }}</h2>

    {% if not missing %}
        <p>You can cook this!</p>
    {% else %}
        <p>Missing ingredients:</p>
        <ul>
            {% for item in missing %}
                <li>{{ item.name }}</li>
            {% endfor %}
        </ul>
    {% endif %}
    
{% endif %}

{% endblock %}
