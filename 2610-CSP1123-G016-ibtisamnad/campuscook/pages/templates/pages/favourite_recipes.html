{% extends 'pages/base.html' %}

{% block content %}

<main class="saved_recipes">

    <h1>My Saved Recipes</h1>
    <p id="recipe-count" class="recipe_count">Loading…</p>

    <div class="recipe_list" id="saved-list">
        <p class="loading">Fetching saved recipes…</p>
    </div>

</main>

<script>
    const LIST_URL   = "{% url 'favourite_recipe_list' %}";
    const TOGGLE_URL = "/api/toggle-favourite/";

    async function loadSaved() {
        const listEl  = document.getElementById('saved-list');
        const countEl = document.getElementById('recipe-count');

        try {
            const res  = await fetch(LIST_URL);
            const data = await res.json();

            if (!data.length) {
                listEl.innerHTML    = '<p>No saved recipes yet.</p>';
                countEl.textContent = '0 recipes saved';
                return;
            }

            countEl.textContent = `${data.length} recipe${data.length !== 1 ? 's' : ''} saved`;

            listEl.innerHTML = data.map(item => `
                <div class="saved_card" id="fav-${item.fav_id}">
                    <a href="/recipes-detail/${item.recipe_id}/" class="saved_title">
                        ${escHtml(item.title)}
                    </a>
                    <button class="btn_unsave" onclick="unfavourite(${item.recipe_id}, ${item.fav_id}, this)">
                        Remove
                    </button>
                </div>
            `).join('');

        } catch (err) {
            listEl.innerHTML = '<p>Could not load saved recipes.</p>';
            console.error(err);
        }
    }

    async function unfavourite(recipeId, favId, btn) {
        if (!confirm('Remove this recipe from saved?')) return;
        try {
            const res = await fetch(`${TOGGLE_URL}${recipeId}/`, {
                method: 'DELETE',
                headers: { 'X-CSRFToken': getCookie('csrftoken') },
            });
            if (!res.ok) throw new Error('Delete failed');

            document.getElementById(`fav-${favId}`).remove();
            const remaining = document.querySelectorAll('.saved_card').length;
            document.getElementById('recipe-count').textContent =
                `${remaining} recipe${remaining !== 1 ? 's' : ''} saved`;

        } catch (err) {
            alert('Could not remove. Try again.');
            console.error(err);
        }
    }

    function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
    }

    function escHtml(str) {
        return String(str || '')
            .replace(/&/g, '&amp;').replace(/</g, '&lt;')
            .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    loadSaved();
</script>

{% endblock %}
