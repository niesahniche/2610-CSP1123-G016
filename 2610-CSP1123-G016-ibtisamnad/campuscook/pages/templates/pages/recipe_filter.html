{% extends 'pages/base.html' %}

{% block content %}

<main class="recipe_filter">

  <!-- FILTER FORM ────────────────────────────────────────────────────────────
       GET form → recipe_filter view in views.py
       view filters Recipe table and returns matching rows as {{ recipes }}  -->
  <form method="GET" action="{% url 'recipe_filter' %}" class="filter_form">

    <!-- SEARCH — filters Recipe.name via icontains in views.py -->
    <div class="filter_group">
      <label class="filter_label">Search</label>
      <input
        type="text"
        name="search"
        class="filter_input"
        placeholder="e.g. fried rice..."
        value="{{ request.GET.search }}"
      >
    </div>

    <!-- COOKING TIME — maps to Recipe.cooking_time (IntegerField)
         quick=<15, medium=15-30, long=>30 handled in views.py      -->
    <div class="filter_group">
      <label class="filter_label">Cooking Time</label>
      <div class="filter_options">
        <label class="filter_check">
          <input type="radio" name="time" value=""
            {% if not request.GET.time %}checked{% endif %}> All
        </label>
        <label class="filter_check">
          <input type="radio" name="time" value="quick"
            {% if request.GET.time == 'quick' %}checked{% endif %}> Under 15 mins
        </label>
        <label class="filter_check">
          <input type="radio" name="time" value="medium"
            {% if request.GET.time == 'medium' %}checked{% endif %}> 15–30 mins
        </label>
        <label class="filter_check">
          <input type="radio" name="time" value="long"
            {% if request.GET.time == 'long' %}checked{% endif %}> Above 30 mins
        </label>
      </div>
    </div>

    <!-- APPLIANCE — maps to Recipe.appliance (CharField) -->
    <div class="filter_group">
      <label class="filter_label">Appliance</label>
      <div class="filter_options">
        <label class="filter_check"><input type="checkbox" name="appliance" value="none"> No Appliance</label>
        <label class="filter_check"><input type="checkbox" name="appliance" value="microwave"> Microwave</label>
        <label class="filter_check"><input type="checkbox" name="appliance" value="oven"> Oven</label>
        <label class="filter_check"><input type="checkbox" name="appliance" value="stove"> Stove</label>
        <label class="filter_check"><input type="checkbox" name="appliance" value="airfryer"> Air Fryer</label>
        <label class="filter_check"><input type="checkbox" name="appliance" value="blender"> Blender</label>
      </div>
    </div>

    <!-- ── FILTERS BELOW NOT YET IN models.py ──────────────────────────────
         Uncomment in BOTH this file AND views.py once fields are added
         to Recipe model and migrations are run.

    <div class="filter_group">
      <label class="filter_label">Category</label>
      <div class="filter_options">
        <label class="filter_check"><input type="checkbox" name="category" value="breakfast"> Breakfast</label>
        <label class="filter_check"><input type="checkbox" name="category" value="lunch"> Lunch</label>
        <label class="filter_check"><input type="checkbox" name="category" value="dinner"> Dinner</label>
        <label class="filter_check"><input type="checkbox" name="category" value="snack"> Snack</label>
        <label class="filter_check"><input type="checkbox" name="category" value="dessert"> Dessert</label>
      </div>
    </div>

    <div class="filter_group">
      <label class="filter_label">Budget</label>
      <div class="filter_options">
        <label class="filter_check"><input type="checkbox" name="budget" value="low"> Below RM5</label>
        <label class="filter_check"><input type="checkbox" name="budget" value="medium"> RM5–RM15</label>
        <label class="filter_check"><input type="checkbox" name="budget" value="high"> Above RM15</label>
      </div>
    </div>

    <div class="filter_group">
      <label class="filter_label">Dietary</label>
      <div class="filter_options">
        <label class="filter_check"><input type="radio" name="halal" value="" checked> All</label>
        <label class="filter_check"><input type="radio" name="halal" value="true"> Halal Only</label>
        <label class="filter_check"><input type="radio" name="halal" value="false"> Non-Halal Only</label>
      </div>
    </div>
    ── -->

    <div class="filter_buttons">
      <button type="submit" class="btn_apply">Apply Filters</button>
      <a href="{% url 'recipe_filter' %}" class="btn_clear">Clear All</a>
    </div>

  </form>

  <!-- RESULTS ──────────────────────────────────────────────────────────────
       recipes → filtered queryset from recipe_filter view
       recipe.id   → PK of Recipe table
       recipe.name → name field (NOT recipe.title — model uses 'name')
       recipe.cooking_time → IntegerField
       recipe.appliance    → CharField                                      -->
  <section class="filter_results">
    <h2 class="results_title">Results</h2>
    <div class="recipe_cards">

      {% for recipe in recipes %}
        <article class="card">
          <div class="card_body">

            <!-- recipe.name → name field from Recipe table -->
            <h2 class="card_title">{{ recipe.name }}</h2>

            <div class="card_tags">
              <span class="recipe_time">⏱ {{ recipe.cooking_time }} mins</span>
              <span class="recipe_appliance">🔧 {{ recipe.appliance }}</span>
              <!-- add category/budget/halal tags here once fields exist in model -->
            </div>

            <a href="{% url 'recipe_detail' recipe.id %}" class="recipe_link">View Recipe →</a>

          </div>
        </article>
      {% empty %}
        <p class="no_results">No recipes match your filters.</p>
      {% endfor %}

    </div>
  </section>

</main>

{% endblock %}
