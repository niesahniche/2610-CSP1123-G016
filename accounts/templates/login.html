<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sign In</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #FFFFFF;
      font-family: 'Segoe UI', sans-serif;
      padding: 2rem 1rem;
    }
     
    .card {
      background: #FFFFFF;
      border: 1px solid #2e2e42;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
 
    /* header - same style as signup */
    .card-header {
      text-align: center;
      margin-bottom: 2rem;
    }
 
    .card-header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #000000;
      letter-spacing: -0.5px;
    }
 
    .card-header p {
      color: #099b10a9;
      margin-top: 0.4rem;
      font-size: 0.9rem;
    }
 
    .field {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
 
    .form-group {
      margin-bottom: 1.2rem;
    }
 
    .field label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #025f1e;
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
 
    /* Typeable input boxes */
    input[type="text"],
    input[type="email"],
    input[type="password"] {
      flex: 1;
      height: 34px;
      padding: 0 0.6rem;
      border: 1.5px solid #555;
      border-radius: 4px;
      font-family: Arial, sans-serif;
      font-size: 0.9rem;
      color: #111;
      background: #ffffff;
      outline: none;
      cursor: text;
      -webkit-appearance: none;
      appearance: none;
    }
 
    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: #7c5cbf;
      box-shadow: 0 0 0 3px rgba(124, 92, 191, 0.15);
    }
 
    .forgot-row {
      display: flex;
      justify-content: flex-end;
      margin-top: -0.4rem;
      margin-bottom: 0.6rem;
    }
 
    .forgot-row a {
      font-size: 0.75rem;
      color: #7c5cbf;
      text-decoration: none;
    }
 
    .forgot-row a:hover { text-decoration: underline; }
 
    .field-error {
      font-size: 0.72rem;
      color: #c0392b;
      margin-left: 96px;
      margin-top: -0.5rem;
      margin-bottom: 0.5rem;
    }
 
    /* Non-field errors (wrong username/password) */
    .login-error {
      background: #fdf0ee;
      color: #9b2226;
      border: 1px solid #f0b4ae;
      border-radius: 6px;
      padding: 0.5rem 0.8rem;
      font-size: 0.82rem;
      margin-bottom: 1rem;
    }
 
    /* Django messages */
    .messages { margin-bottom: 1.2rem; }
 
    .message {
      padding: 0.7rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      margin-bottom: 0.5rem;
    }
 
    .message.success { background: #1a3a2a; color: #4caf82; border: 1px solid #2d5a3d; }
    .message.error   { background: #3a1a1a; color: #ff6b6b; border: 1px solid #5a2d2d; }
 
    .btn-submit {
      width: 100%;
      padding: 0.875rem;
      background: #94D4AA;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.2s, transform 0.1s;
    }
 
    .btn-submit:hover  { background: #6AC383; }
    .btn-submit:active { transform: scale(0.99); }
 
    /* Link to signup page */
    .footer-link {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.82rem;
      color: #888;
    }
 
    .footer-link a {
      color: #7c5cbf;
      font-weight: 600;
      text-decoration: none;
    }
 
    .footer-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <h1>Welcome Back!</h1>
    <p>Sign in to your account</p>
  </div>
 
  <!-- Unable to link the two pages using django yet -->
  <form method="POST" action="{% url 'login' %}">
    {% csrf_token %}
    
    <input type="hidden" name="next" value="{{ next }}"/>
 
    <div class="form-group">
      <label for="id_username">Email</label>
      <input type="text" id="id_username" name="username" placeholder="Enter your email"  autocomplete="username"/>
    </div>
    
 
    <div class="form-group">
      <label for="id_password">Password</label>
      <input type="password" id="id_password" name="password" placeholder="Enter your password" autocomplete="current-password"/>
    </div>
      
   
 
    <div class="forgot-row">
      <a href="{% url 'password_reset' %}">Forgot password?</a>
    </div>

    <!-- Need to link this to home page -->
    <div class="sign-in">
      <button type="submit" class="btn-submit">Sign In</button>
    </div>
  </form>
 
  <!-- Might change the "signup.html" after database is available -->
  <!-- Link back to signup page -->
  <p class="footer-link">
    Don't have an account? <a href="{% url 'signup' %}">Create one</a>
  </p>
</div>
 
</body>
</html>
