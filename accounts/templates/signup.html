<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Create Account</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #FFFFFF;
      font-family: 'Segoe UI', sans-serif;
      padding: 2rem 1rem;
    }
 
    .card {
      background: #FFFFFF;
      border: 1px solid #2e2e42;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
 
    .card-header {
      text-align: center;
      margin-bottom: 2rem;
    }
 
    .card-header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #000000;
      letter-spacing: -0.5px;
    }
 
    .card-header p {
      color: #099b10a9;
      margin-top: 0.4rem;
      font-size: 0.9rem;
    }
 
    .name-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
 
    .form-group {
      margin-bottom: 1.2rem;
    }
 
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #025f1e;
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
 
    .form-control {
      width: 100%;
      padding: 0.75rem 1rem;
      background: #12121c;
      border: 1px solid #2e2e42;
      border-radius: 8px;
      color: #e0e0f0;
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
 
    .form-control::placeholder { color: #44445a; }
 
    .form-control:focus {
      border-color: #6c63ff;
      box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
    }
 
    /* Django field errors */
    .errorlist {
      list-style: none;
      margin-top: 0.35rem;
    }
 
    .errorlist li {
      font-size: 0.78rem;
      color: #ff6b6b;
    }
 
    /* Django messages */
    .messages { margin-bottom: 1.2rem; }
 
    .message {
      padding: 0.7rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      margin-bottom: 0.5rem;
    }
 
    .message.success { background: #1a3a2a; color: #4caf82; border: 1px solid #2d5a3d; }
    .message.error   { background: #3a1a1a; color: #ff6b6b; border: 1px solid #5a2d2d; }
 
    .btn-submit {
      width: 100%;
      padding: 0.875rem;
      background: #96D4AA;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.2s, transform 0.1s;
    }
 
    .btn-submit:hover  { background: #6AC383; }
    .btn-submit:active { transform: scale(0.99); }
 
    .login-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.875rem;
      color: #6b6b8a;
    }
 
    .login-link a {
      color: #6c63ff;
      text-decoration: none;
      font-weight: 600;
    }
 
    .login-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <h1>Welcome Aboard! <p>Create an account</p></h1>
    <p>Sign up to get started today</p>
  </div>
 
  <form method="POST" action="{% url 'signup' %}">
    {% csrf_token %}
 
    <div class="name-row">
      <div class="form-group">
        <label for="{{ form.name.id_for_label }}">Name</label>
         <input type="text" name="name" placeholder="Enter your name">
      </div>
    </div>
 
    <!-- Hardcoded in the value for classes, no real info from user yet-->
    <div class="form-group">
      <label for="{{ form.username.id_for_label }}">Username</label>
       <input type="text" name="username" placeholder="Enter username">
    </div>
 
    <div class="form-group">
      <label for="{{ form.email.id_for_label }}">Email Address</label>
       <input type="email" name="email" placeholder="Enter your email address">
    </div>
 
    <div class="form-group">
      <label for="{{ form.password1.id_for_label }}">Password</label>
       <input type="password" name="password1" placeholder="Enter password">
    </div>
 
    <div class="form-group">
      <label for="{{ form.password2.id_for_label }}">Confirm Password</label>
       <input type="password" name="password2" placeholder="Confirm password">
    </div>
 
    <button type="submit" class="btn-submit">Create Account</button>
  </form>
 

  <p class="login-link">
    Already have an account? <a href="{% url 'login' %}">Sign in</a>
  </p>
</div>
 
</body>
</html>
